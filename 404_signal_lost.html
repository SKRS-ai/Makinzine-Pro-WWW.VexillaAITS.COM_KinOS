<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KinOS | 404 Signal Lost</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@200;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --os-cobalt: #0066ff;
            --os-neon: #00f2ff;
            --os-obsidian: #010103;
            --os-gold: #ffcc00;
            --os-red: #ff3333;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--os-obsidian);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- GLITCH ANIMATION --- */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .scanline {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.1);
            animation: scanline 4s linear infinite;
        }

        .error-container {
            text-align: center;
            border: 1px solid var(--os-red);
            padding: 60px;
            background: rgba(255, 51, 51, 0.02);
            position: relative;
            max-width: 600px;
        }

        .error-code {
            font-family: 'Orbitron';
            font-size: 5rem;
            color: var(--os-red);
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
        }

        .error-msg {
            font-family: 'Orbitron';
            font-size: 0.8rem;
            letter-spacing: 5px;
            margin-bottom: 30px;
            color: #888;
        }

        .terminal-log {
            text-align: left;
            font-size: 0.7rem;
            color: #444;
            margin-bottom: 40px;
            border-top: 1px solid #222;
            padding-top: 20px;
        }

        .return-btn {
            display: inline-block;
            background: var(--os-cobalt);
            color: #fff;
            padding: 15px 30px;
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            font-weight: 900;
            border: 1px solid var(--os-neon);
        }

        .return-btn:hover {
            background: var(--os-neon);
            color: #000;
        }

    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="error-container">
        <h1 class="error-code">404</h1>
        <div class="error-msg">SIGNAL_LOST_IN_VOID</div>

        <div class="terminal-log">
            > SOURCE: AEAH.org_PROTOCOL<br>
            > ALERT: DATA_PACKET_DROPPED<br>
            > REASON: UNAUTHORIZED_OR_NONEXISTENT_NODE<br>
            > STATUS: RE-ESTABLISHING_HANDSHAKE_WITH_PHILLY_HUB...
        </div>

        <a href="index.html" class="return-btn">RETURN_TO_SECURE_KERNEL</a>
        
        <div style="margin-top: 20px; font-size: 0.6rem; color: #333;">
            ERR_REF: 0x000F404_KINOS_V1
        </div>
    </div>

</body>
</html>
